<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danke | Gebäudeservice Böhme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Playfair Display",serif;background:linear-gradient(135deg,#16213a 0%,#2448a6 58%,#2f5dcc 100%);color:#fff;padding:24px;text-align:center}
    .card{width:min(92vw,720px);padding:54px 34px;border-radius:34px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);box-shadow:0 24px 70px rgba(0,0,0,.24);backdrop-filter:blur(10px)}
    h1{margin:0 0 18px;font-size:clamp(42px,8vw,72px);line-height:1;letter-spacing:-.05em}
    p{margin:0 auto 30px;max-width:560px;font-size:22px;line-height:1.7;color:#eef4ff}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:58px;padding:0 28px;border-radius:999px;background:#fff;color:#2448a6;text-decoration:none;font-weight:800;font-size:18px;box-shadow:0 14px 30px rgba(0,0,0,.18)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Vielen Dank!</h1>
    <p>Ihre Anfrage wurde erfolgreich gesendet. Wir melden uns so schnell wie möglich bei Ihnen.</p>
    <a href="index.html">Zurück zur Startseite</a>
  </main>
</body>
</html>
